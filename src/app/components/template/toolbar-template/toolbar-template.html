<mat-toolbar class="menu-toolbar">
    <button (click)="onClickMenu()" matIconButton class="icon" aria-label="icon-button with menu icon">
        <mat-icon>menu</mat-icon>
    </button>
    <!-- <span class="font-inter">Dashboard</span> -->
    <span class="flex-1"></span>
    <button matIconButton class="icon favorite-icon" aria-label="icon-button with notifications icon">
        <mat-icon>notifications</mat-icon>
    </button>
    <button matIconButton [matMenuTriggerFor]="menu" class="icon" aria-label="icon-button with account_circle icon">
        <mat-icon>account_circle</mat-icon>
    </button>
</mat-toolbar>
<mat-menu #menu="matMenu" class="menu">
    <button mat-menu-item (click)="openProfile()">
        <mat-icon>account_circle</mat-icon>
        <span>Profile</span>
    </button>
    <button mat-menu-item (click)="onLogout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
    </button>
</mat-menu>
