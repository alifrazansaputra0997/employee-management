<app-form-searching-employee 
    (onFindAct)="onFind($event)"
    (onAddEmployeeAct)="onAddEmployee($event)"
    [DDLGroup]="DDLGroup"
    [filteredGroup]="filteredGroup"
/> 
<mat-card class="card mt-4 bg-white" appearance="outlined">
    <mat-card-content>
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort (matSortChange)="matSortChange($event)">
            <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef>ACTION</th>
                <td mat-cell *matCellDef="let element">
                    <div class="action">
                        <button mat-flat-button class="btn-edit" (click)="onEdit(element)">Edit</button>
                        <button mat-flat-button class="btn-delete" (click)="onDelete(element)">Delete</button>
                    </div>
                </td>
            </ng-container>
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> NAME</th>
                <td mat-cell *matCellDef="let element"> {{element.firstName}} {{element.lastName}} </td>
            </ng-container>
            <ng-container matColumnDef="group">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> GROUP </th>
                <td mat-cell *matCellDef="let element"> {{element.group}} </td>
            </ng-container>
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> EMAIL </th>
                <td mat-cell *matCellDef="let element"> {{element.email}} </td>
            </ng-container>
            <ng-container matColumnDef="birthDate">
                <th mat-header-cell *matHeaderCellDef > BIRTH DATE </th>
                <td mat-cell *matCellDef="let element"> {{element.birthDate}} </td>
            </ng-container>
            <ng-container matColumnDef="basicSalary">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> BASIC SALARY </th>
                <td mat-cell *matCellDef="let element"> {{element.basicSalary}} </td>
            </ng-container>
            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> STATUS </th>
                <td mat-cell *matCellDef="let element"> {{element.status}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        <app-paginator [dataTable]="dataTable" (onDataReady)="onDataReady($event)" />
    </mat-card-content>
</mat-card>
